<!doctype html>

<html lang="en">
  <head>
    <!-- This sets the page character format. -->
    <meta charset="UTF-8" />
    <!-- This makes the site responsive on phones and laptops. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- This is the browser tab title. -->
    <title>Bober Clinic</title>

  <body>

</html>
