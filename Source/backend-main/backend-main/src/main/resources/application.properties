# Bober Clinic note: Stores backend settings such as port, database, CORS URL, and JWT keys.
# File: backend-main/backend-main/src/main/resources/application.properties

# Backend application name shown in Spring Boot logs.
spring.application.name=bober-backend

# Backend server port. The frontend calls http://localhost:8080.
server.port=8080

# Hibernate updates tables automatically, so the local demo database is created for you.
spring.jpa.hibernate.ddl-auto=update

# Local H2 file database. This avoids PostgreSQL and keeps accounts saved after restart.
spring.datasource.url=jdbc:h2:file:./data/beaver-local;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# H2 browser console for checking local tables and saved accounts.
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Frontend URL allowed by backend CORS.
frontend.url=http://localhost:3000/

# RSA keys used by the JWT login/token system.
jwt.rsa-private-key=classpath:certs/privateKey.pem
jwt.rsa-public-key=classpath:certs/publicKey.pem

# Existing GitHub OAuth settings from the original project.
