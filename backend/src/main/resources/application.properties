# Backend port.
server.port=8080

# Local H2 database file.
spring.datasource.url=jdbc:h2:file:./data/bober-clinic

# H2 database driver.
spring.datasource.driverClassName=org.h2.Driver

# Local database username.
spring.datasource.username=sa

# Local database password is blank for the demo.
spring.datasource.password=

# Hibernate updates tables automatically when the app starts.
spring.jpa.hibernate.ddl-auto=update

# Shows SQL in the terminal, useful for explaining what the backend stores.
spring.jpa.show-sql=true

# Allows the H2 browser console at http://localhost:8080/h2-console.
spring.h2.console.enabled=true

# Shows readable backend error messages.
server.error.include-message=always
