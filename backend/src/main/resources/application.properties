# The backend runs on localhost:8080.
server.port=8080

# This stores the database in backend/data/bober-clinic.mv.db.
spring.datasource.url=jdbc:h2:file:./data/bober-clinic

# This is the H2 database driver.
spring.datasource.driverClassName=org.h2.Driver

# This is the local database username.
spring.datasource.username=sa

# This is the local database password. It is blank for this simple demo.
spring.datasource.password=

# Hibernate updates tables automatically when the app starts.
spring.jpa.hibernate.ddl-auto=update

# Shows SQL in the terminal, useful for explaining what the backend stores.
spring.jpa.show-sql=true

# Allows the H2 browser console at http://localhost:8080/h2-console.
spring.h2.console.enabled=true

# Shows readable backend error messages.
server.error.include-message=always
